name: Test Lab3

on:
  push:
    paths:
      - 'lab3/**'
  pull_request:
    paths:
      - 'lab3/**'

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      
      - name: List structure for debugging
        run: |
          echo "Current directory:"
          pwd
          echo "Lab3 contents:"
          ls -la lab3/
          echo "Looking for tests:"
          find lab3 -name "*.py" -type f | head -20
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov
      
      - name: Create minimal tests if not exist
        run: |
          cd lab3
          mkdir -p tests
          if [ ! -f tests/test_simple.py ]; then
            cat > tests/test_simple.py << 'EOF'
