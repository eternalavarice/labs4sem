[pytest]
# Директория с тестами
testpaths = tests

# Python пути для импортов
pythonpath = .

# Опции командной строки по умолчанию
addopts = 
    -v
    --strict-markers
    --tb=short
    --cov=app
    --cov-report=term-missing
    --cov-report=html
    --cov-fail-under=80

# Маркеры для фильтрации тестов
markers =
    unit: Модульные тесты
    integration: Интеграционные тесты
    advanced: Продвинутые тесты с моками
    slow: Медленные тесты